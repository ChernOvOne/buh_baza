<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAZA — Вход</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #04040a;
  --surface: #0c0c16;
  --border:  #1c1c2a;
  --border2: #252535;
  --acc:     #00e5ff;
  --acc2:    #7c3aed;
  --green:   #00f5a0;
  --red:     #ff3060;
  --text:    #f0f4ff;
  --muted:   #4a5068;
  --text2:   #8892b0;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(0,229,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,0.025) 1px, transparent 1px);
  background-size: 44px 44px;
  animation: gm 24s linear infinite;
  pointer-events: none;
}
@keyframes gm { to { transform: translateY(44px); } }

.card {
  position: relative; z-index: 1;
  width: 400px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 44px 36px;
  box-shadow: 0 40px 80px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.03);
  animation: up .5s cubic-bezier(.16,1,.3,1) both;
}
@keyframes up {
  from { opacity:0; transform: translateY(24px) scale(0.98); }
  to   { opacity:1; transform: none; }
}

/* Logo */
.logo-wrap { display: flex; align-items: center; gap: 12px; margin-bottom: 36px; }
.logo-mark {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, var(--acc), var(--acc2));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Unbounded', sans-serif;
  font-size: 14px; font-weight: 900;
  color: #04040a;
  box-shadow: 0 0 20px rgba(0,229,255,0.25);
  flex-shrink: 0;
}
.logo-name {
  font-family: 'Unbounded', sans-serif;
  font-weight: 900; font-size: 18px;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, var(--acc), var(--acc2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.logo-sub { font-size: 9px; color: var(--muted); letter-spacing: 2.5px; text-transform: uppercase; margin-top: 2px; }

h1 { font-size: 22px; font-weight: 600; margin-bottom: 5px; }
.sub { font-size: 12px; color: var(--text2); margin-bottom: 28px; line-height: 1.5; }
.sub b { color: var(--acc); font-weight: 600; }

/* Fields — одинаковый стиль для text и password */
.field { margin-bottom: 16px; }
.field label {
  display: block;
  font-size: 10px; color: var(--muted);
  letter-spacing: 1.5px; text-transform: uppercase;
  margin-bottom: 7px;
}
.field input {
  width: 100%;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 12px 14px;
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  outline: none;
  transition: border-color .2s, box-shadow .2s, background .2s;
  -webkit-appearance: none;
}
.field input:focus {
  border-color: var(--acc);
  background: rgba(0,229,255,0.04);
  box-shadow: 0 0 0 3px rgba(0,229,255,0.08);
}
.field input::placeholder { color: var(--muted); }

/* Button */
.btn {
  width: 100%;
  padding: 13px;
  margin-top: 8px;
  background: linear-gradient(135deg, #00c4dc, #0099b8);
  border: none;
  border-radius: 8px;
  color: #04040a;
  font-family: 'Unbounded', sans-serif;
  font-weight: 700; font-size: 12px;
  letter-spacing: 0.5px; text-transform: uppercase;
  cursor: pointer;
  transition: opacity .2s, transform .15s;
  box-shadow: 0 0 20px rgba(0,229,255,0.2);
}
.btn:hover  { opacity: .88; transform: translateY(-1px); }
.btn:active { transform: none; }
.btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

/* Error */
.error {
  background: rgba(255,48,96,0.08);
  border: 1px solid rgba(255,48,96,0.25);
  border-radius: 8px;
  padding: 10px 13px;
  font-size: 12px; color: var(--red);
  margin-top: 14px;
  display: none;
}
.error.show { display: block; animation: shake .3s; }
@keyframes shake {
  0%,100% { transform: translateX(0); }
  25%     { transform: translateX(-5px); }
  75%     { transform: translateX(5px); }
}

/* Footer */
.footer {
  margin-top: 26px;
  padding-top: 18px;
  border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 7px;
}
.dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 5px var(--green);
  animation: pu 2s infinite;
}
@keyframes pu { 0%,100%{opacity:1} 50%{opacity:.3} }
.foot-text { font-size: 11px; color: var(--muted); }
</style>
</head>
<body>
<div class="card">

  <div class="logo-wrap">
    <div class="logo-mark">B</div>
    <div>
      <div class="logo-name">BAZA</div>
      <div class="logo-sub">VPN Finance</div>
    </div>
  </div>

  <h1>Вход в систему</h1>
  <p class="sub">Логин — <b>admin</b>, пароль — из файла <b>.env</b></p>

  <form id="loginForm">
    <div class="field">
      <label>Логин</label>
      <input type="text" id="username" placeholder="admin"
             autocomplete="username" spellcheck="false" value="admin">
    </div>
    <div class="field">
      <label>Пароль</label>
      <input type="password" id="password" placeholder="••••••••••••"
             autocomplete="current-password">
    </div>
    <button type="submit" class="btn" id="submitBtn">Войти →</button>
    <div class="error" id="errorMsg"></div>
  </form>

  <div class="footer">
    <div class="dot"></div>
    <span class="foot-text">Защищённое соединение • BAZA v4.0</span>
  </div>

</div>
<script>
const form   = document.getElementById('loginForm');
const btn    = document.getElementById('submitBtn');
const errEl  = document.getElementById('errorMsg');
const uInput = document.getElementById('username');
const pInput = document.getElementById('password');

// Focus password (логин уже заполнен)
pInput.focus();

function showError(msg) {
  errEl.textContent = msg;
  errEl.classList.add('show');
}
function hideError() {
  errEl.classList.remove('show');
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  hideError();

  const username = uInput.value.trim();
  const password = pInput.value;

  if (!username || !password) {
    showError('Введи логин и пароль');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Проверка...';

  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });

    let data = {};
    try { data = await r.json(); } catch {}

    if (r.ok && data.ok) {
      btn.textContent = '✓ Вошёл';
      btn.style.background = 'linear-gradient(135deg, #00f5a0, #00c47a)';
      setTimeout(() => { window.location.href = '/'; }, 600);
    } else {
      showError(data.error || 'Неверный логин или пароль');
      btn.disabled = false;
      btn.textContent = 'Войти →';
      pInput.value = '';
      pInput.focus();
    }
  } catch (err) {
    showError('Нет соединения с сервером');
    btn.disabled = false;
    btn.textContent = 'Войти →';
  }
});
</script>
</body>
</html>
