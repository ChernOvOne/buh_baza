<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Учёт — Вход</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #050508;
    --surface:  #0d0d18;
    --border:   #1e1e30;
    --acc:      #00d4ff;
    --acc2:     #7c3aed;
    --green:    #00ff88;
    --red:      #ff4d6d;
    --text:     #e2e8f0;
    --muted:    #606880;
    --glow:     rgba(0,212,255,0.15);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridMove 20s linear infinite;
  }
  @keyframes gridMove { to { transform: translateY(40px); } }

  /* Glowing orbs */
  body::after {
    content: '';
    position: fixed;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(0,212,255,0.06) 0%, transparent 70%);
    top: -200px; left: -200px;
    animation: float 8s ease-in-out infinite;
  }
  @keyframes float {
    0%,100% { transform: translate(0,0); }
    50% { transform: translate(60px, 40px); }
  }

  .card {
    position: relative; z-index: 1;
    width: 420px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 40px;
    box-shadow:
      0 0 0 1px rgba(0,212,255,0.05),
      0 40px 80px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(255,255,255,0.04);
    animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes slideUp {
    from { opacity:0; transform: translateY(32px) scale(0.97); }
    to   { opacity:1; transform: none; }
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
  }
  .logo-icon {
    width: 42px; height: 42px;
    background: linear-gradient(135deg, #00d4ff, #7c3aed);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    box-shadow: 0 0 20px rgba(0,212,255,0.3);
  }
  .logo-text {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 18px;
    letter-spacing: -0.5px;
    color: var(--text);
  }
  .logo-sub {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
  }
  .subtitle {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 32px;
    letter-spacing: 0.5px;
  }

  .field {
    margin-bottom: 20px;
  }
  label {
    display: block;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  input[type="password"] {
    width: 100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 13px 16px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    letter-spacing: 3px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
  }
  input[type="password"]:focus {
    border-color: var(--acc);
    background: rgba(0,212,255,0.04);
    box-shadow: 0 0 0 3px rgba(0,212,255,0.1);
  }

  .btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #00d4ff, #0099cc);
    border: none;
    border-radius: 8px;
    color: #050508;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 0 20px rgba(0,212,255,0.25), 0 4px 12px rgba(0,0,0,0.3);
    margin-top: 8px;
  }
  .btn:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 0 30px rgba(0,212,255,0.4); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .error-msg {
    background: rgba(255,77,109,0.1);
    border: 1px solid rgba(255,77,109,0.3);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    color: var(--red);
    margin-top: 16px;
    display: none;
  }
  .error-msg.show { display: block; animation: shake 0.3s; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  .footer {
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
  .status-text { font-size: 11px; color: var(--muted); }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">📊</div>
    <div>
      <div class="logo-text">AccountingOS</div>
      <div class="logo-sub">Finance Dashboard</div>
    </div>
  </div>

  <h1>Вход в систему</h1>
  <p class="subtitle">Введи пароль для доступа к панели</p>

  <form id="loginForm">
    <div class="field">
      <label>Пароль доступа</label>
      <input type="password" id="password" placeholder="••••••••••••" autofocus autocomplete="current-password">
    </div>
    <button type="submit" class="btn" id="submitBtn">Войти →</button>
    <div class="error-msg" id="errorMsg">Неверный пароль. Попробуй ещё раз.</div>
  </form>

  <div class="footer">
    <div class="status-dot"></div>
    <span class="status-text">Система активна • Защищённое соединение</span>
  </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const err = document.getElementById('errorMsg');
  const pwd = document.getElementById('password').value;

  btn.disabled = true;
  btn.textContent = 'Проверка...';
  err.classList.remove('show');

  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pwd })
    });
    if (r.ok) {
      btn.textContent = '✓ Успешно';
      btn.style.background = 'linear-gradient(135deg, #00ff88, #00cc66)';
      setTimeout(() => window.location.href = '/', 600);
    } else {
      err.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Войти →';
      document.getElementById('password').value = '';
    }
  } catch {
    err.textContent = 'Ошибка соединения с сервером';
    err.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'Войти →';
  }
});
</script>
</body>
</html>
